<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WebDev Basics — Learn by Doing</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<header>
  <div class="logo-icon">&lt;/&gt;</div>

    <div class="welcome-chips">
      <span class="chip chip-html">HTML</span>
      <span class="chip chip-css">CSS</span>
      <span class="chip chip-js">JavaScript</span>
    </div>
  </div>
